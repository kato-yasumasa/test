<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カップシャッフルゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 300px;
            height: 200px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
        }

        .cup-wrapper {
            position: absolute;
            width: 80px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.3s ease-in-out, transform 0.3s;
        }

        .cup {
            font-size: 60px;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.5s;
        }

        .character {
            position: absolute;
            bottom: 10px;
            font-size: 40px;
            z-index: 1;
            display: none; /* 最初は隠しておく */
        }

        .message {
            margin-top: 50px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        /* カップが持ち上がるアニメーション */
        .lift-up {
            transform: translateY(-50px);
        }
    </style>
</head>
<body>

    <div class="message" id="message">スタートボタンを押してね！</div>

    <div id="game-container">
        <div class="cup-wrapper" id="cup-0" style="left: 0px;">
            <div class="cup" onclick="selectCup(0)">🥤</div>
            <div class="character" id="char-0">🐥</div>
        </div>
        <div class="cup-wrapper" id="cup-1" style="left: 110px;">
            <div class="cup" onclick="selectCup(1)">🥤</div>
            <div class="character" id="char-1">🐥</div>
        </div>
        <div class="cup-wrapper" id="cup-2" style="left: 220px;">
            <div class="cup" onclick="selectCup(2)">🥤</div>
            <div class="character" id="char-2">🐥</div>
        </div>
    </div>

    <button id="start-btn" onclick="startGame()">ゲーム開始！</button>

    <script>
        let correctCup = 1; // 🐥が入っているカップの番号
        let isShuffling = false;
        let canSelect = false;
        const positions = [0, 110, 220]; // 各カップの左からの座標
        let currentOrder = [0, 1, 2]; // 現在のカップの並び順

        function startGame() {
            if (isShuffling) return;
            
            // リセット
            canSelect = false;
            document.getElementById('message').innerText = "どこにいるかな？";
            document.querySelectorAll('.character').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.cup').forEach(c => c.classList.remove('lift-up'));

            // 1. 最初に見せる
            correctCup = Math.floor(Math.random() * 3);
            const targetChar = document.getElementById(`char-${correctCup}`);
            targetChar.style.display = 'block';
            
            // 2. カップを被せて隠す (少し待ってからシャッフル)
            setTimeout(() => {
                targetChar.style.display = 'none';
                shuffleEffect(10); // 10回入れ替え
            }, 1000);
        }

        async function shuffleEffect(times) {
            isShuffling = true;
            for (let i = 0; i < times; i++) {
                await new Promise(resolve => setTimeout(resolve, 400));
                
                // ランダムに2つの位置を入れ替える
                let idx1 = Math.floor(Math.random() * 3);
                let idx2 = Math.floor(Math.random() * 3);
                while (idx1 === idx2) idx2 = Math.floor(Math.random() * 3);

                // 配列の中身をスワップ
                [currentOrder[idx1], currentOrder[idx2]] = [currentOrder[idx2], currentOrder[idx1]];
                
                // 画面上の位置(left)を更新
                updatePositions();
            }
            isShuffling = false;
            canSelect = true;
            document.getElementById('message').innerText = "カップを選んで！";
        }

        function updatePositions() {
            currentOrder.forEach((cupId, index) => {
                document.getElementById(`cup-${cupId}`).style.left = positions[index] + 'px';
            });
        }

        function selectCup(cupId) {
            if (!canSelect) return;
            canSelect = false;

            // タップしたカップを持ち上げる
            const cupElement = document.querySelector(`#cup-${cupId} .cup`);
            cupElement.classList.add('lift-up');

            // 中身を表示
            if (cupId === correctCup) {
                document.getElementById(`char-${cupId}`).style.display = 'block';
                document.getElementById('message').innerText = "あたり！🎉";
            } else {
                document.getElementById('message').innerText = "はずれ...💀";
                // 正解も表示してあげる
                setTimeout(() => {
                    document.querySelector(`#cup-${correctCup} .cup`).classList.add('lift-up');
                    document.getElementById(`char-${correctCup}`).style.display = 'block';
                }, 500);
            }
        }
    </script>
</body>
</html>
