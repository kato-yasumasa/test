<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>３マッチパズル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            color: #333;
            overflow: hidden;
            touch-action: none; /* ブラウザのデフォルトスワイプを無効化 */
        }

        h1 {
            margin-bottom: 20px;
            color: #4a4a4a;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        #time-bar-container {
            width: 90%;
            max-width: 600px;
            height: 20px;
            background-color: #ccc;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        #time-bar-fill {
            height: 100%;
            width: 100%;
            background-color: #4CAF50;
            border-radius: 10px;
            transition: width 0.9s linear;
        }

        #game-container {
            border: 4px solid #8B4513;
            background-color: #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background-color: #eee;
            border-radius: 10px;
            cursor: pointer;
        }

        #game-over-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #game-over-popup p {
            color: white;
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 30px;
        }

        #game-over-popup button {
            background-color: #FF4500;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.5em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>３マッチパズル</h1>
    <div id="time-bar-container">
        <div id="time-bar-fill"></div>
    </div>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="game-over-popup">
        <p id="game-over-text">GAME OVER</p>
        <button id="play-again-button">もう一度プレイ</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const timeBarFill = document.getElementById('time-bar-fill');
        const gameOverPopup = document.getElementById('game-over-popup');
        const playAgainButton = document.getElementById('play-again-button');

        let TILE_SIZE;
        const GRID_COLS = 8;
        const GRID_ROWS = 8;
        const ITEM_TYPES = 5;
        const SWAP_ANIMATION_DURATION = 200;
        const MATCH_FADE_DURATION = 300;
        const DROP_ANIMATION_DURATION = 400;
        
        const MAX_GAME_TIME = 60;
        const TIME_BONUS_PER_MATCH = 3;
        const LOW_TIME_THRESHOLD_RATIO = 0.1;

        let gameBoard = [];
        let selectedTile = null;
        let isProcessing = false;
        let gameTime = MAX_GAME_TIME;
        let timeUpdateInterval = null;
        let isGameOver = false;
        let isShaking = false;
        let shakeAnimationId = null;

        const itemImages = [];
        let loadedImages = 0;

        function loadImages(callback) {
            for (let i = 1; i <= ITEM_TYPES; i++) {
                const img = new Image();
                img.src = `img/${i}.png`;
                img.onload = () => {
                    loadedImages++;
                    if (loadedImages === ITEM_TYPES) callback();
                };
                img.onerror = () => console.error(`Failed to load: img/${i}.png`);
                itemImages.push(img);
            }
        }

        function calculateCanvasSize() {
            const maxBoardWidth = window.innerWidth * 0.95;
            const maxBoardHeight = window.innerHeight * 0.80;
            TILE_SIZE = Math.min(Math.floor(maxBoardWidth / GRID_COLS), Math.floor(maxBoardHeight / GRID_ROWS));
            TILE_SIZE = Math.max(TILE_SIZE, 30);
            canvas.width = GRID_COLS * TILE_SIZE;
            canvas.height = GRID_ROWS * TILE_SIZE;
            gameContainer.style.width = `${canvas.width + 28}px`;
            gameContainer.style.height = `${canvas.height + 28}px`;
        }

        function initBoard() {
            gameBoard = Array(GRID_ROWS).fill(null).map(() => Array(GRID_COLS).fill(null));
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    let newItem;
                    do {
                        newItem = Math.floor(Math.random() * ITEM_TYPES);
                    } while (
                        (c >= 2 && gameBoard[r][c - 1] === newItem && gameBoard[r][c - 2] === newItem) ||
                        (r >= 2 && gameBoard[r - 1][c] === newItem && gameBoard[r - 2][c] === newItem)
                    );
                    gameBoard[r][c] = newItem;
                }
            }
            drawBoard();
        }

        function drawBoard(alpha = 1, excludeTiles = []) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const excludeSet = new Set(excludeTiles.map(t => `${t.row},${t.col}`));
            const shakeStrength = 2;
            const shakeSpeed = 0.1;

            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    if (excludeSet.has(`${r},${c}`)) continue;

                    const itemType = gameBoard[r][c];
                    if (itemType !== null) {
                        let offsetX = 0, offsetY = 0;
                        if (isShaking) {
                            offsetX = Math.sin((performance.now() * shakeSpeed) + r * 1.2 + c * 0.8) * shakeStrength;
                            offsetY = Math.cos((performance.now() * shakeSpeed) + r * 0.8 + c * 1.2) * shakeStrength;
                        }

                        ctx.fillStyle = '#f8f8f8';
                        ctx.fillRect(c * TILE_SIZE + offsetX, r * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);

                        ctx.globalAlpha = alpha;
                        const img = itemImages[itemType];
                        if (img && img.complete) {
                            ctx.drawImage(img, c * TILE_SIZE + offsetX, r * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
                        }
                        ctx.globalAlpha = 1;

                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(c * TILE_SIZE + offsetX, r * TILE_SIZE + offsetY, TILE_SIZE, TILE_SIZE);
                    }

                    if (selectedTile && selectedTile.row === r && selectedTile.col === c) {
                        ctx.strokeStyle = '#FFD700';
                        ctx.lineWidth = 4;
                        ctx.strokeRect(c * TILE_SIZE + 2, r * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            }
        }

        // --- 操作イベント (マウス & タッチ共通化) ---
        let startX, startY;

        function handleStart(x, y) {
            if (isProcessing || isGameOver) return;
            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((x - rect.left) / TILE_SIZE);
            const row = Math.floor((y - rect.top) / TILE_SIZE);
            if (row >= 0 && row < GRID_ROWS && col >= 0 && col < GRID_COLS) {
                startX = x;
                startY = y;
                selectedTile = { row, col };
                drawBoard();
            }
        }

        async function handleEnd(x, y) {
            if (!selectedTile || isProcessing || isGameOver) return;
            const dx = x - startX;
            const dy = y - startY;
            const threshold = TILE_SIZE * 0.4;
            let targetTile = null;

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
                targetTile = { row: selectedTile.row, col: selectedTile.col + (dx > 0 ? 1 : -1) };
            } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > threshold) {
                targetTile = { row: selectedTile.row + (dy > 0 ? 1 : -1), col: selectedTile.col };
            }

            if (targetTile && isValidSwap(selectedTile, targetTile)) {
                isProcessing = true;
                await animateSwap(selectedTile, targetTile);
                if (findMatches().length > 0) {
                    await processGameCycle();
                } else {
                    await animateSwap(targetTile, selectedTile);
                }
            }
            selectedTile = null;
            isProcessing = false;
            drawBoard();
        }

        // マウスイベント
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mouseup', (e) => handleEnd(e.clientX, e.clientY));

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        });

        // --- コアロジック ---
        function isValidSwap(t1, t2) {
            if (t2.row < 0 || t2.row >= GRID_ROWS || t2.col < 0 || t2.col >= GRID_COLS) return false;
            return Math.abs(t1.row - t2.row) + Math.abs(t1.col - t2.col) === 1;
        }

        async function animateSwap(t1, t2) {
            const i1 = gameBoard[t1.row][t1.col], i2 = gameBoard[t2.row][t2.col];
            const animated = [
                { type: i1, x: t1.col * TILE_SIZE, y: t1.row * TILE_SIZE, tx: t2.col * TILE_SIZE, ty: t2.row * TILE_SIZE },
                { type: i2, x: t2.col * TILE_SIZE, y: t2.row * TILE_SIZE, tx: t1.col * TILE_SIZE, ty: t1.row * TILE_SIZE }
            ];
            const start = performance.now();
            return new Promise(resolve => {
                function frame() {
                    const progress = Math.min((performance.now() - start) / SWAP_ANIMATION_DURATION, 1);
                    drawBoard(1, [t1, t2]);
                    animated.forEach(t => {
                        const cx = t.x + (t.tx - t.x) * progress, cy = t.y + (t.ty - t.y) * progress;
                        ctx.drawImage(itemImages[t.type], cx, cy, TILE_SIZE, TILE_SIZE);
                    });
                    if (progress < 1) requestAnimationFrame(frame);
                    else {
                        gameBoard[t1.row][t1.col] = i2; gameBoard[t2.row][t2.col] = i1;
                        drawBoard(); resolve();
                    }
                }
                requestAnimationFrame(frame);
            });
        }

        async function processGameCycle() {
            while (true) {
                const matches = findMatches();
                if (matches.length === 0) break;
                addTime(TIME_BONUS_PER_MATCH);
                await animateMatchRemoval(matches);
                dropTiles();
                await animateDrop();
                fillEmptyTiles();
                await animateFill();
            }
        }

        function findMatches() {
            const matches = new Set();
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS - 2; c++) {
                    const t = gameBoard[r][c];
                    if (t !== null && t === gameBoard[r][c+1] && t === gameBoard[r][c+2]) {
                        [c, c+1, c+2].forEach(cc => matches.add(`${r},${cc}`));
                    }
                }
            }
            for (let c = 0; c < GRID_COLS; c++) {
                for (let r = 0; r < GRID_ROWS - 2; r++) {
                    const t = gameBoard[r][c];
                    if (t !== null && t === gameBoard[r+1][c] && t === gameBoard[r+2][c]) {
                        [r, r+1, r+2].forEach(rr => matches.add(`${rr},${c}`));
                    }
                }
            }
            return Array.from(matches).map(s => { const [r, c] = s.split(',').map(Number); return {row:r, col:c}; });
        }

        async function animateMatchRemoval(matches) {
            const start = performance.now();
            return new Promise(resolve => {
                function frame() {
                    const progress = Math.min((performance.now() - start) / MATCH_FADE_DURATION, 1);
                    drawBoard(1, matches);
                    ctx.globalAlpha = 1 - progress;
                    matches.forEach(m => ctx.drawImage(itemImages[gameBoard[m.row][m.col]], m.col * TILE_SIZE, m.row * TILE_SIZE, TILE_SIZE, TILE_SIZE));
                    ctx.globalAlpha = 1;
                    if (progress < 1) requestAnimationFrame(frame);
                    else { matches.forEach(m => gameBoard[m.row][m.col] = null); drawBoard(); resolve(); }
                }
                requestAnimationFrame(frame);
            });
        }

        function dropTiles() {
            for (let c = 0; c < GRID_COLS; c++) {
                let empty = 0;
                for (let r = GRID_ROWS - 1; r >= 0; r--) {
                    if (gameBoard[r][c] === null) empty++;
                    else if (empty > 0) { gameBoard[r+empty][c] = gameBoard[r][c]; gameBoard[r][c] = null; }
                }
            }
        }

        async function animateDrop() { drawBoard(); return new Promise(r => setTimeout(r, DROP_ANIMATION_DURATION)); }

        function fillEmptyTiles() {
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    if (gameBoard[r][c] === null) gameBoard[r][c] = Math.floor(Math.random() * ITEM_TYPES);
                }
            }
        }

        async function animateFill() { drawBoard(); return new Promise(r => setTimeout(r, 200)); }

        function updateTimeBarDisplay() {
            const p = (gameTime / MAX_GAME_TIME) * 100;
            timeBarFill.style.width = `${p}%`;
            timeBarFill.style.backgroundColor = p > 50 ? '#4CAF50' : (p > 20 ? '#FFD700' : '#FF6347');
            if (gameTime <= MAX_GAME_TIME * LOW_TIME_THRESHOLD_RATIO && !isShaking) startShaking();
            else if (gameTime > MAX_GAME_TIME * LOW_TIME_THRESHOLD_RATIO && isShaking) stopShaking();
        }

        function updateTime() { gameTime--; updateTimeBarDisplay(); if (gameTime <= 0) gameOver(); }
        function addTime(amt) { gameTime = Math.min(gameTime + amt, MAX_GAME_TIME); updateTimeBarDisplay(); }

        function gameOver() {
            clearInterval(timeUpdateInterval); stopShaking(); isGameOver = true;
            gameOverPopup.style.display = 'flex';
        }

        function startShaking() {
            isShaking = true;
            if (!shakeAnimationId) {
                const loop = () => { drawBoard(); if (isShaking) shakeAnimationId = requestAnimationFrame(loop); else shakeAnimationId = null; };
                shakeAnimationId = requestAnimationFrame(loop);
            }
        }

        function stopShaking() { isShaking = false; if (shakeAnimationId) cancelAnimationFrame(shakeAnimationId); shakeAnimationId = null; drawBoard(); }

        function startGame() {
            isGameOver = false; gameTime = MAX_GAME_TIME; gameOverPopup.style.display = 'none';
            updateTimeBarDisplay();
            if (timeUpdateInterval) clearInterval(timeUpdateInterval);
            timeUpdateInterval = setInterval(updateTime, 1000);
            initBoard(); stopShaking();
        }

        calculateCanvasSize();
        loadImages(startGame);
        window.addEventListener('resize', () => { calculateCanvasSize(); drawBoard(); });
        playAgainButton.addEventListener('click', startGame);
    </script>
</body>
</html>
